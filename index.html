<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crawler Multi Value Demo</title>

<meta name="description" content="Crawler demo site with multi value fields">

<!-- Crawler readable meta fields -->
<meta name="category" content="crawler-demo">
<meta name="author" content="crawler-demo">
<meta name="multi_value" content="red widget|blue widget|green widget|crawler testing">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Crawler Demo Source Page",
  "description": "Demo page used to test crawler multi value fields",
  "multi_value": [
    "red widget",
    "blue widget",
    "green widget",
    "crawler testing"
  ]
}
</script>

<style>
body{
font-family:Arial;
margin:40px;
background:#f5f7fb;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.title{
font-size:32px;
font-weight:bold;
}

.section{
margin-top:30px;
}

.values span{
display:inline-block;
background:#eef3ff;
padding:6px 12px;
border-radius:20px;
margin:5px;
}

button{
padding:10px 16px;
margin-top:10px;
border:none;
background:#4f7cff;
color:white;
border-radius:6px;
cursor:pointer;
}

.search-result{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">Crawler Demo Website</div>

<p>This demo page contains a <b>multi-value field</b> that can be used for crawler testing.</p>

<div class="section">
<h2>Source Multi Value Field</h2>

<div class="values" id="sourceValues">
<span>red widget</span>
<span>blue widget</span>
<span>green widget</span>
<span>crawler testing</span>
</div>

</div>


<div class="section">
<h2>Simulate Crawl Transformation</h2>

<p>Transformation applied: <b>Convert case → ALL UPPERCASE</b></p>

<button onclick="simulateCrawl()">Simulate Crawl</button>

<div class="search-result" id="result"></div>

</div>

</div>

<script>

function simulateCrawl(){

const values = [
"red widget",
"blue widget",
"green widget",
"crawler testing"
]

const transformed = values.map(v => v.toUpperCase())

let html = "<h3>Search Page Result</h3>"

transformed.forEach(v=>{
html += "<div>"+v+"</div>"
})

document.getElementById("result").innerHTML = html

}

</script>

</body>
</html>
